name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend-amd64:
    name: Backend compiler tests (linux-amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install QEMU user emulators
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user

      - name: Install Wasmtime
        run: |
          curl -fsSL https://wasmtime.dev/install.sh | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build frontend backend
        run: |
          go build -o "$RUNNER_TEMP/rtg-backend" .
          echo "RTG_BACKEND=$RUNNER_TEMP/rtg-backend" >> "$GITHUB_ENV"

      - name: Run backend tests
        env:
          RTG_CROSS_ARCH_TESTS: "1"
        run: go test -count=1 -timeout 30m .

  backend-arm64:
    name: Backend compiler tests (linux-arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build frontend backend
        run: |
          go build -o "$RUNNER_TEMP/rtg-backend" .
          echo "RTG_BACKEND=$RUNNER_TEMP/rtg-backend" >> "$GITHUB_ENV"

      - name: Run backend tests
        run: |
          tests="$(go test -list '^Test' . | grep '^Test' | grep -v '^TestCompilerPerformance$' | grep -v '^TestFrontendCompilerPerformance$' | paste -sd'|' -)"
          go test -count=1 -timeout 30m -run "^(${tests})$" .

  frontend-corpus:
    name: Frontend corpus tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run frontend corpus tests
        env:
          RTG_FRONTEND_EXTENDED_TESTS: "1"
          RTG_FRONTEND_SELFHOST_TESTS: "1"
        run: go test -count=1 ./rtg_tests
